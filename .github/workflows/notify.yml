name: Check KNU AIC Notice

on:
  schedule:
    - cron: '0 * * * *' # 매시간 정각마다 실행
  workflow_dispatch: # 수동 테스트 버튼

# ★ 핵심 추가: 깃허브 로봇에게 파일 쓰기(저장) 권한을 부여합니다!
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 체크아웃 (최신 v4 버전으로 변경)
      uses: actions/checkout@v5

    - name: 파이썬 환경 설정 (최신 v5 버전으로 변경)
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: 필요 라이브러리 설치
      run: pip install requests beautifulsoup4

    - name: 공지사항 확인 스크립트 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scraper.py

    - name: 최신 글 정보 변경 시 저장소에 안전하게 반영
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add -A
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update latest notice" && git push)
