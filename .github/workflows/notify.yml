name: Check KNU AIC Notice

on:
  schedule:
    - cron: '0 * * * *' # 매시간 정각마다 실행
  workflow_dispatch: # 수동 테스트 버튼

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # ★ 변경된 부분: 구글 AI 라이브러리(google-genai) 추가 설치!
    - name: 필요 라이브러리 설치
      run: pip install requests beautifulsoup4 google-genai

    # ★ 변경된 부분: 금고에서 구글 AI 키(GEMINI_API_KEY) 꺼내오기!
    - name: 공지사항 확인 스크립트 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python scraper.py

    - name: 최신 글 정보 변경 시 저장소에 자동 반영
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add -A
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update latest notice" && git push)
