name: Check KNU AIC Notice

on:
  schedule:
    - cron: '0 * * * *' # 매시간 정각마다 자동 실행 (UTC 기준)
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v3

    - name: 파이썬 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필요 라이브러리 설치
      run: |
        pip install requests beautifulsoup4

    - name: 공지사항 확인 스크립트 실행
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python scraper.py

    - name: 변경된 최신 글 정보(latest_notice.txt) 저장소에 자동 반영
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add latest_notice.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update latest notice" && git push)
